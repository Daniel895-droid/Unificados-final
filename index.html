<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>UNIANEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(180deg,#0a0a0f 0%,#12121a 50%,#0a0a0f 100%);color:#fff;min-height:100vh;padding:env(safe-area-inset-top,20px) 20px calc(env(safe-area-inset-bottom,20px) + 20px) 20px;overflow-x:hidden}

.header{text-align:center;padding:40px 0 30px}
.logo-container{position:relative;width:100px;height:100px;margin:0 auto 24px}
.logo{width:100px;height:100px;background:linear-gradient(135deg,#00d4aa 0%,#0099ff 50%,#aa44ff 100%);border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 20px 60px rgba(0,180,255,0.3),0 0 100px rgba(0,212,170,0.15);animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo::before{content:’’;position:absolute;inset:-3px;background:linear-gradient(135deg,#00d4aa,#0099ff,#aa44ff);border-radius:30px;z-index:-1;opacity:0.5;filter:blur(15px)}
.title{font-size:32px;font-weight:800;letter-spacing:6px;margin-bottom:8px;background:linear-gradient(90deg,#00d4aa,#0099ff,#aa44ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:13px;color:#6b7280;letter-spacing:2px;text-transform:uppercase}

.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:30px;margin:0 auto 35px;width:fit-content}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 10px #22c55e}
.status-text{font-size:12px;color:#9ca3af}

.modules{display:flex;flex-direction:column;gap:16px;max-width:500px;margin:0 auto}

.module{position:relative;background:linear-gradient(145deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px;text-decoration:none;color:inherit;display:block;overflow:hidden;transition:all 0.3s ease}
.module::before{content:’’;position:absolute;top:0;left:0;right:0;height:3px;border-radius:20px 20px 0 0}
.module:active{transform:scale(0.98);background:rgba(255,255,255,0.08)}

.module.pre::before{background:linear-gradient(90deg,#00d4aa,#00b894)}
.module.intra::before{background:linear-gradient(90deg,#0099ff,#0066cc)}
.module.rpa::before{background:linear-gradient(90deg,#aa44ff,#8833cc)}

.module-glow{position:absolute;top:-50%;right:-50%;width:200px;height:200px;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none}
.module.pre .module-glow{background:#00d4aa}
.module.intra .module-glow{background:#0099ff}
.module.rpa .module-glow{background:#aa44ff}

.module-content{position:relative;display:flex;align-items:center;gap:18px}
.module-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.module.pre .module-icon{background:rgba(0,212,170,0.15);box-shadow:0 8px 30px rgba(0,212,170,0.2)}
.module.intra .module-icon{background:rgba(0,153,255,0.15);box-shadow:0 8px 30px rgba(0,153,255,0.2)}
.module.rpa .module-icon{background:rgba(170,68,255,0.15);box-shadow:0 8px 30px rgba(170,68,255,0.2)}

.module-text{flex:1}
.module-title{font-size:17px;font-weight:700;margin-bottom:4px}
.module.pre .module-title{color:#00d4aa}
.module.intra .module-title{color:#0099ff}
.module.rpa .module-title{color:#aa44ff}
.module-desc{font-size:13px;color:#6b7280;line-height:1.4}

.module-arrow{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:18px;color:#6b7280}

.footer{text-align:center;margin-top:50px;padding-bottom:20px}
.footer-logo{font-size:11px;color:#374151;letter-spacing:3px;margin-bottom:8px}
.footer-version{font-size:10px;color:#1f2937}
.footer-line{width:60px;height:3px;background:linear-gradient(90deg,#00d4aa,#0099ff,#aa44ff);border-radius:3px;margin:20px auto 0;opacity:0.5}

.bg-grid{position:fixed;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:-1}
</style>

</head>
<body>

<div class="bg-grid"></div>

<header class="header">
<div class="logo-container">
<div class="logo">🏥</div>
</div>
<h1 class="title">UNIANEST</h1>
<p class="subtitle">Sistema Integrado de Anestesia</p>
</header>

<div class="status-bar">
<div class="status-dot"></div>
<span class="status-text">Sistema Operacional</span>
</div>

<nav class="modules">
<a href="pre-anestesia.html" class="module pre">
<div class="module-glow"></div>
<div class="module-content">
<div class="module-icon">📋</div>
<div class="module-text">
<div class="module-title">Pre-Anestesia</div>
<div class="module-desc">Avaliacao pre-operatoria completa</div>
</div>
<div class="module-arrow">›</div>
</div>
</a>

<a href="ficha-intra.html" class="module intra">
<div class="module-glow"></div>
<div class="module-content">
<div class="module-icon">🩺</div>
<div class="module-text">
<div class="module-title">Intraoperatorio</div>
<div class="module-desc">Ficha anestesica em tempo real</div>
</div>
<div class="module-arrow">›</div>
</div>
</a>

<a href="rpa.html" class="module rpa">
<div class="module-glow"></div>
<div class="module-content">
<div class="module-icon">🏥</div>
<div class="module-text">
<div class="module-title">Recuperacao</div>
<div class="module-desc">Sala de recuperacao pos-anestesica</div>
</div>
<div class="module-arrow">›</div>
</div>
</a>
</nav>

<footer class="footer">
<div class="footer-logo">HUGG • UNIRIO • EBSERH</div>
<div class="footer-version">v2.1.0</div>
<div class="footer-line"></div>
</footer>

</body>
</html>
