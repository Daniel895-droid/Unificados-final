<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>UNIANEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:-apple-system,sans-serif;background:#0a0f1a;color:#e8edf5;overflow:hidden;width:100%;height:100%}
#app{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#141e33;border-bottom:1px solid #2a3f6b;height:42px;flex-shrink:0}
.logo{font-weight:800;font-size:14px;color:#00ccff}
.toolbar{display:flex;align-items:center;gap:8px;padding:4px 12px;background:#141e33;border-bottom:1px solid #2a3f6b;height:32px;flex-shrink:0}
.tb-spacer{flex:1}
.tb-btn{padding:4px 12px;border-radius:5px;border:1px solid #2a3f6b;background:#1c2a48;color:#e8edf5;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;min-height:0}table{border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid #2a3f6b;padding:0;text-align:center;vertical-align:middle;font-size:11px;font-weight:600;height:32px}
th{position:sticky;top:0;z-index:10;background:#141e33;font-size:9px;font-weight:700;color:#a0b4d8;height:26px}
.lbl{position:sticky;left:0;z-index:5;background:#10182a;text-align:left;padding:0 6px;font-size:10px;color:#a0b4d8;width:110px;min-width:110px;max-width:110px;white-space:nowrap;overflow:hidden}
.corner{position:sticky;left:0;top:0;z-index:20;background:#141e33}
th.now{color:#00ddff;background:rgba(0,204,255,.12)}
.sec td,.sec th{background:#182240;height:18px;font-size:7px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#6080aa}
.sec .lbl{background:#182240}
td.dc{width:70px;min-width:70px;max-width:70px;cursor:pointer;background:#0f1726}
td.dc.future{opacity:.25;pointer-events:none}
.c-ecg{color:#22ddff}.c-spo2{color:#00ff99;font-weight:800}.c-capno{color:#ffdd44}
.c-resp{color:#cc88ff;font-size:9px}.c-o2{color:#55aaff}.c-sevo{color:#ffdd44}
.c-pas{color:#44ccff}.c-pad{color:#3399ee}.c-fc{color:#ff6688}.c-pump{color:#ffaa55;font-weight:700}
.c-evt{background:rgba(0,230,255,.3);color:#00ffff;font-weight:800;font-size:10px}
.c-ph{background:rgba(200,140,255,.3);color:#dd99ff;font-weight:800;font-size:10px}
.c-ex{background:rgba(255,220,50,.3);color:#ffee44;font-weight:800;font-size:10px}
.c-obs{background:rgba(255,160,70,.3);color:#ffbb66;font-weight:800;font-size:10px}
.c-gains{color:#00ff99;font-size:8px;font-weight:700}
.c-losses{color:#ff5566}
.graph-row .lbl{font-size:9px;font-weight:800;text-align:right;padding-right:6px}
svg.gsv{position:absolute;top:0;left:0;pointer-events:none;z-index:10}
.mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:#1c2a48;border-radius:16px;width:calc(100% - 20px);max-width:420px;max-height:70vh;overflow-y:auto;padding:16px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mtitle{font-size:15px;font-weight:800}
.mclose{width:30px;height:30px;border-radius:50%;border:1px solid #2a3f6b;background:#141e33;color:#a0b4d8;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.mlabel{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#6080aa;margin:10px 0 4px}
.numdisp{text-align:center;font-size:36px;font-weight:800;color:#00ddff;padding:12px;background:#0f1726;border-radius:8px;border:1px solid #2a3f6b;min-height:60px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.nbtn{height:48px;border-radius:8px;border:1px solid #2a3f6b;background:#141e33;color:#e8edf5;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit}
.nbtn.del{background:rgba(255,68,102,.15);color:#ff5566;font-size:14px}
.opts{display:flex;flex-direction:column;gap:4px}
.opt{padding:12px;border-radius:8px;border:1px solid #2a3f6b;background:#141e33;color:#e8edf5;font-size:13px;cursor:pointer}
.opt.sel{background:rgba(0,204,255,.2);border-color:#00ccff;color:#00ddff}
.mbtns{display:flex;gap:8px;margin-top:12px}
.mbtn{flex:1;padding:12px;border-radius:8px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.mbtn-s{background:#00ccff;color:#0a0f1a}
.mbtn-c{background:#141e33;color:#a0b4d8;border:1px solid #2a3f6b}
.mbtn-d{background:rgba(255,68,102,.15);color:#ff4466;border:1px solid rgba(255,68,102,.3)}
.cursor{color:#00ddff;animation:blink 1s step-end infinite;font-weight:400}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="app">
<div class="hdr">
  <div class="logo">UNIANEST</div>
  <span style="font-size:11px;cursor:pointer;padding:2px 8px;border:1px solid #263354;border-radius:4px;background:rgba(255,255,255,.05)" id="patName">Dados do Paciente</span>
  <div style="font-weight:700;color:#00ccff;font-size:14px" id="hdrTime">--:--</div>
</div>
<div class="toolbar">
  <span style="font-size:9px;font-weight:700;color:#00ccff;cursor:pointer;padding:2px 6px;border:1px solid rgba(0,204,255,.3);border-radius:4px;background:rgba(0,204,255,.08)" id="tAnest">ANEST --:-- / --:--</span>
  <span style="font-size:9px;font-weight:700;color:#00e68a;cursor:pointer;padding:2px 6px;border:1px solid rgba(0,230,138,.3);border-radius:4px;background:rgba(0,230,138,.08);margin-left:4px" id="tCir">CIR --:-- / --:--</span>
  <div class="tb-spacer"></div>
  <button class="tb-btn" id="btnRew">-5min</button>
  <button class="tb-btn" id="btnAdv">+5min</button>
  <button class="tb-btn" id="btnCfg" style="font-size:13px">&#9881;</button>
  <button class="tb-btn" id="btnEnc" style="background:rgba(0,230,138,.12);color:#00e68a;border-color:rgba(0,230,138,.3)">Fim</button>
  <button class="tb-btn" id="btnSum">Resumo</button>
</div>
<div class="wrap" id="wrap"></div>
</div>
<div class="mbg" id="mbg"><div class="modal" id="mc"></div></div>

<script>
var CW=70, GROW=7, SCALE=[240,200,160,120,80,40,20];
var S={t0h:15,t0m:0,cur:0,slots:13,started:false,d:[],ev:{},ph:{},ex:{},evC:0,phC:0,exC:0,cirS:null,cirE:null,
  anestSH:null,anestSM:null,anestEH:null,anestEM:null,
  cirSH:null,cirSM:null,cirEH:null,cirEM:null,
  pat:{nome:"",cpf:"",dn:"",genero:"",idade:"",peso:"",altura:"",jejum:"",alergias:"",doencas:"",cirPrevias:"",medicamentos:"",mallampati:"",asa:"",consentimento:"",cirurgiao:"",cirurgia:"",sala:""},
  pumps:[],
  monitors:[],  // optional: [{id,name,unit}]
  enc:{tecnica:"",cirRealizada:"",aldrete:{atividade:-1,respiracao:-1,consciencia:-1,circulacao:-1,spo2:-1},aldreteTotal:-1}
};

// Optional monitoring devices
var MONITOR_OPTS=[
  {id:"mon_bis",name:"BIS/Conox",unit:"",cc:"c-capno"},
  {id:"mon_tof",name:"TOF",unit:"",cc:"c-spo2"},
  {id:"mon_dc",name:"Debito Cardiaco",unit:"L/min",cc:"c-fc"},
  {id:"mon_pam",name:"PAM",unit:"mmHg",cc:"c-pas"},
  {id:"mon_pvc",name:"PVC",unit:"cmH2O",cc:"c-pad"},
  {id:"mon_ic",name:"Indice Cardiaco",unit:"L/min/m2",cc:"c-fc"},
  {id:"mon_vvs",name:"VVS",unit:"%",cc:"c-capno"}
];

// Available infusion pump drugs
// Available infusion pump drugs with concentrations (mg/ml)
// conc: fixed concentration. concs: user selects concentration when adding
var PUMP_DRUGS=[
  {id:"pump_propofol1",name:"Propofol 1%",units:["ml/h","mg/kg/h","mcg/kg/min"],conc:10},
  {id:"pump_propofol2",name:"Propofol 2%",units:["ml/h","mg/kg/h","mcg/kg/min"],conc:20},
  {id:"pump_remifentanil",name:"Remifentanil",units:["ml/h","mcg/kg/min"],concs:[0.02,0.05,0.1],concUnit:"mg/ml"},
  {id:"pump_dexmedetomidina",name:"Dexmedetomidina",units:["ml/h","mcg/kg/h"],conc:0.002,concUnit:"mg/ml"},
  {id:"pump_rocuronio",name:"Rocuronio",units:["ml/h","mg/kg/h"],conc:10},
  {id:"pump_cetamina",name:"Cetamina",units:["ml/h","mg/kg/h"],concs:[10,50],concUnit:"mg/ml"},
  {id:"pump_noradrenalina",name:"Noradrenalina",units:["ml/h","mcg/kg/min"],concs:[0.04,0.08,0.16],concUnit:"mg/ml"},
  {id:"pump_adrenalina",name:"Adrenalina",units:["ml/h","mcg/kg/min"],concs:[0.01,0.02,0.04],concUnit:"mg/ml"},
  {id:"pump_dobutamina",name:"Dobutamina",units:["ml/h","mcg/kg/min"],concs:[1,2,4],concUnit:"mg/ml"},
  {id:"pump_nitroprussiato",name:"Nitroprussiato",units:["ml/h","mcg/kg/min"],conc:0.2},
  {id:"pump_nitroglicerina",name:"Nitroglicerina",units:["ml/h","mcg/kg/min"],conc:0.2},
  {id:"pump_lidocaina",name:"Lidocaina",units:["ml/h","mg/kg/h"],concs:[10,20],concUnit:"mg/ml"},
  {id:"pump_insulina",name:"Insulina",units:["UI/h"],conc:1,concUnit:"UI/ml"},
  {id:"pump_midazolam",name:"Midazolam",units:["ml/h","mg/h"],concs:[1,5],concUnit:"mg/ml"},
  {id:"pump_fentanil",name:"Fentanil",units:["ml/h","mcg/h"],conc:0.05,concUnit:"mg/ml"},
  {id:"pump_sulfato_mg",name:"Sulfato Magnesio",units:["ml/h","g/h"],concs:[0.1,0.2],concUnit:"g/ml"}
];

// -- no quotes in onclick: store context in globals --
var _mid, _mslot, _mr; // current modal row id, slot, row def
var _nv = "";
var _phName, _phNum;

function buildRows(){
  var rows=[
    {s:"INALATORIO"},
    {id:"o2",lb:"O2 L/min",tp:"num",un:"L/min",cc:"c-o2"},
    {id:"sevo",lb:"Sevo %",tp:"num",un:"%",cc:"c-sevo"},
    {id:"air",lb:"Ar comp",tp:"num",un:"L/min",cc:"c-o2"}
  ];
  // Add active pumps as "BOMBAS INFUSORAS" section
  if(S.pumps.length>0){
    rows.push({s:"BOMBAS INFUSORAS"});
    for(var j=0;j<S.pumps.length;j++){
      var p=S.pumps[j];
      rows.push({id:p.id,lb:p.name+" ("+p.unit+")",tp:"num",un:p.unit,cc:"c-pump"});
    }
  }
  rows.push({s:"VOLUME"});
  rows.push({id:"gains",lb:"Ganhos",tp:"list",cc:"c-gains"});
  rows.push({id:"losses",lb:"Perdas",tp:"num",un:"ml",cc:"c-losses"});
  rows.push({id:"diurese",lb:"Diurese",tp:"num",un:"ml",cc:"c-spo2"});
  rows.push({s:"MONITORIZACAO"});
  rows.push({id:"ecg",lb:"ECG",tp:"sel",opts:["SI","BAV","FA","BRE","BRD","ES","TSV","FLUT A","ISQ","MP"],cc:"c-ecg"});
  rows.push({id:"spo2",lb:"SpO2 %",tp:"num",un:"%",cc:"c-spo2"});
  rows.push({id:"capno",lb:"EtCO2",tp:"num",un:"mmHg",cc:"c-capno"});
  rows.push({id:"resp",lb:"Respiracao",tp:"sel",opts:["ES","A-MF","PSV","PCP","PCV","SIMV-VG","SIMV-VP"],cc:"c-resp"});
  // Optional monitors
  for(var m=0;m<S.monitors.length;m++){
    var mon=S.monitors[m];
    rows.push({id:mon.id,lb:mon.name+(mon.unit?" ("+mon.unit+")":""),tp:"num",un:mon.unit,cc:mon.cc||"c-capno"});
  }
  rows.push({s:"SINAIS VITAIS"});
  rows.push({id:"pas",lb:"PAS mmHg",tp:"num",un:"mmHg",cc:"c-pas"});
  rows.push({id:"pad",lb:"PAD mmHg",tp:"num",un:"mmHg",cc:"c-pad"});
  rows.push({id:"fc",lb:"FC bpm",tp:"num",un:"bpm",cc:"c-fc"});
  rows.push({s:"GRAFICO",graph:true});
  rows.push({s:"REGISTROS"});
  rows.push({id:"position",lb:"Posicao",tp:"sel",opts:["DD","DV","DLE","DLD","Sentado","Litotomia"],cc:"c-ecg"});
  rows.push({id:"pharma",lb:"Farmacos",tp:"pharma"});
  rows.push({id:"events",lb:"Eventos",tp:"event"});
  rows.push({id:"exams",lb:"Exames",tp:"exam"});
  rows.push({id:"obs",lb:"Observacoes",tp:"text"});
  return rows;
}
var ROWS=buildRows();

var EVT_OPTS=["Acesso venoso periferico","Acesso venoso profundo","Acesso venoso central","Pre-oxigenacao","Denitrogenacao","Intubacao orotraqueal","Intubacao nasotraqueal","Intubacao por fibroscopia","Protecao ocular","Fixacao tubo traqueal","Mascara laringea","Canula orofaringea Guedel","Aspiracao+extubacao","Reintubacao","Bloqueio peridural simples","Bloqueio peridural continuo","Raquianestesia","Raqui+peridural combinada","Bloqueio de nervos perifericos","Bloqueio de plexo braquial","Manta termica","Sonda vesical","Sonda nasogastrica","Sonda orogastrica","Puncao arterial","Cateter PAI","Aquecimento de fluidos","Compressao pneumatica MMII","Encaminhado SRPA","Encaminhado UTI","Encaminhado Enfermaria"];
var PH_LIST=["Propofol","Cetamina","Etomidato","Tiopental","Midazolam","Diazepam","Fentanil","Alfentanil","Sufentanil","Remifentanil","Morfina","Nalbufina","Tramadol","Codeina","Metadona","Rocuronio","Cisatracurio","Succinilcolina","Vecuronio","Atracurio","Pancuronio","Lidocaina","Ropivacaina","Bupivacaina","Levobupivacaina","Prilocaina","Ondansetrona","Dexametasona","Metoclopramida","Droperidol","Efedrina","Adrenalina","Noradrenalina","Fenilefrina","Vasopressina","Dobutamina","Dopamina","Milrinona","Atropina","Neostigmine","Sugamadex","Flumazenil","Naloxona","Dipirona","Cetoprofeno","Cetorolaco","Paracetamol","Tenoxicam","Dexketoprofeno","Cefazolina","Ceftriaxona","Amoxicilina+Clavulanato","Ciprofloxacina","Metronidazol","Clindamicina","Vancomicina","Gentamicina","Dexmedetomidina","Clonidina","Hidrocortisona","Metilprednisolona","Sulfato de Magnesio","Cloreto de Calcio","Gluconato de Calcio","Bicarbonato de Sodio","Manitol","Furosemida","Aminofilina","Hidralazina","Esmolol","Metoprolol","Labetalol","Nitroglicerina","Nitroprussiato","Amiodarona","Heparina","Protamina","Acido Tranexamico","Ocitocina","Misoprostol","Metilergometrina","Insulina Regular","Glicose 50%","Albumina Humana","Ringer Lactato","Soro Fisiologico"];

function tStr(i){var m=S.t0m+i*5;var h=S.t0h+Math.floor(m/60);m=m%60;return(h<10?"0":"")+h+":"+(m<10?"0":"")+m;}

function init(){for(var i=0;i<S.slots;i++)S.d[i]={};render();}

function render(){
  var w=document.getElementById("wrap");
  var h="<div style='position:relative'><table><thead><tr><th class='corner lbl'><\/th>";
  for(var i=0;i<S.slots;i++){h+="<th style='width:"+CW+"px;min-width:"+CW+"px'";if(i===S.cur)h+=" class='now'";h+=">"+tStr(i)+"<\/th>";}
  h+="<\/tr><\/thead><tbody>";
  for(var ri=0;ri<ROWS.length;ri++){
    var r=ROWS[ri];
    if(r.s){
      h+="<tr class='sec'><td class='lbl'>"+r.s+"<\/td>";
      for(var i=0;i<S.slots;i++)h+="<td><\/td>";
      h+="<\/tr>";
      if(r.graph){for(var g=0;g<GROW;g++){
        h+="<tr class='graph-row'><td class='lbl' style='color:"+(SCALE[g]>=80?"#33bbff":"#ff5577")+"'>"+SCALE[g]+"<\/td>";
        for(var i=0;i<S.slots;i++)h+="<td class='dc' style='background:rgba(38,51,84,.08)'><\/td>";
        h+="<\/tr>";}}
      continue;
    }
    h+="<tr><td class='lbl'>"+r.lb+"<\/td>";
    for(var i=0;i<S.slots;i++){
      var v=getVal(r.id,i),cc=getCC(r,v),fut=i>S.cur?" future":"";
      h+="<td class='dc "+cc+fut+"' data-r='"+r.id+"' data-i='"+i+"'>"+v+"<\/td>";}
    h+="<\/tr>";}
  h+="<\/tbody><\/table><\/div>";
  w.innerHTML=h;
  drawSVG();
}

function getVal(id,i){
  if(id==="events"){var e=S.ev[i];if(!e||!e.length)return"";return"E"+getEvtSlotNum(i);}
  if(id==="pharma"){var p=S.ph[i];if(!p||!p.length)return"";return"F"+getPhSlotNum(i);}
  if(id==="exams"){var x=S.ex[i];return(x&&x.length)?"Ex"+getExSlotNum(i):"";}
  if(id==="gains"){var d=S.d[i];if(!d||!d.gains)return"";var g=d.gains;if(g.length>8)g=g.substring(0,7)+"..";return g;}
  if(id==="obs"){var d=S.d[i];if(!d||!d.obs)return"";return"Ob"+getObsSlotNum(i);}
  var d=S.d[i];return(d&&d[id]!==undefined)?d[id]:"";}

// Get the sequential number for a slot's events (E1 = first slot with events, E2 = second, etc)
function getEvtSlotNum(slot){
  var n=0;
  for(var i=0;i<=slot;i++){if(S.ev[i]&&S.ev[i].length)n++;}
  return n;
}
function getPhSlotNum(slot){
  var n=0;
  for(var i=0;i<=slot;i++){if(S.ph[i]&&S.ph[i].length)n++;}
  return n;
}
function getExSlotNum(slot){
  var n=0;
  for(var i=0;i<=slot;i++){if(S.ex[i]&&S.ex[i].length)n++;}
  return n;
}
function getObsSlotNum(slot){
  var n=0;
  for(var i=0;i<=slot;i++){if(S.d[i]&&S.d[i].obs)n++;}
  return n;
}
function getCC(r,v){if(!v)return"";if(r.id==="events")return"c-evt";if(r.id==="pharma")return"c-ph";if(r.id==="exams")return"c-ex";if(r.id==="obs")return"c-obs";return r.cc||"";}

function drawSVG(){
  var rows=document.querySelectorAll(".graph-row");if(rows.length<GROW)return;
  var table=document.querySelector("table");if(!table)return;
  var tR=table.getBoundingClientRect(),fR=rows[0].getBoundingClientRect(),lR=rows[GROW-1].getBoundingClientRect();
  var top=fR.top-tR.top,totalH=lR.bottom-fR.top;
  var fc=rows[0].querySelector("td.dc");if(!fc)return;
  var left=fc.getBoundingClientRect().left-tR.left,W=S.slots*CW;
  var sMin=20,sMax=240,rng=sMax-sMin;
  var old=document.querySelector(".gsv");if(old)old.parentNode.removeChild(old);
  var ns="http://www.w3.org/2000/svg";
  var svg=document.createElementNS(ns,"svg");
  svg.setAttribute("class","gsv");svg.setAttribute("width",W);svg.setAttribute("height",totalH);
  svg.style.cssText="position:absolute;top:"+top+"px;left:"+left+"px;width:"+W+"px;height:"+totalH+"px;pointer-events:none;z-index:10";
  function yOf(v){return totalH-((v-sMin)/rng)*totalH;}
  var pas=[],pad=[],fcd=[];
  for(var i=0;i<=S.cur&&i<S.slots;i++){var d=S.d[i];if(d){if(d.pas)pas.push({i:i,v:d.pas});if(d.pad)pad.push({i:i,v:d.pad});if(d.fc)fcd.push({i:i,v:d.fc});}}
  function mkLine(pts,color,dash){if(pts.length<2)return;var p=document.createElementNS(ns,"polyline");var s="";for(var j=0;j<pts.length;j++){if(j)s+=" ";s+=(pts[j].i*CW+CW/2)+","+yOf(pts[j].v);}p.setAttribute("points",s);p.setAttribute("fill","none");p.setAttribute("stroke",color);p.setAttribute("stroke-width","1.5");if(dash)p.setAttribute("stroke-dasharray",dash);svg.appendChild(p);}
  function mkTri(cx,cy,up,col){var t=document.createElementNS(ns,"polygon");if(up)t.setAttribute("points",cx+","+(cy-7)+" "+(cx-5)+","+(cy+1)+" "+(cx+5)+","+(cy+1));else t.setAttribute("points",cx+","+(cy+7)+" "+(cx-5)+","+(cy-1)+" "+(cx+5)+","+(cy-1));t.setAttribute("fill",col);svg.appendChild(t);}
  function mkTxt(cx,cy,val,col){var t=document.createElementNS(ns,"text");t.setAttribute("x",cx);t.setAttribute("y",cy);t.setAttribute("text-anchor","middle");t.setAttribute("fill",col);t.setAttribute("font-size","8");t.setAttribute("font-weight","bold");t.textContent=val;svg.appendChild(t);}
  mkLine(pas,"rgba(51,187,255,.5)");
  for(var j=0;j<pas.length;j++){var cx=pas[j].i*CW+CW/2,cy=yOf(pas[j].v);mkTri(cx,cy,false,"#33bbff");mkTxt(cx,cy-6,pas[j].v,"#33bbff");}
  mkLine(pad,"rgba(34,119,204,.5)");
  for(var j=0;j<pad.length;j++){var cx=pad[j].i*CW+CW/2,cy=yOf(pad[j].v);mkTri(cx,cy,true,"#2277cc");mkTxt(cx,cy+14,pad[j].v,"#2277cc");}

// === CELL TAP ===
function cellTap(id,i){
  if(!S.started)startAnest();
  if(i>S.cur)return;
  var r=null;for(var j=0;j<ROWS.length;j++){if(ROWS[j].id===id){r=ROWS[j];break;}}
  if(!r)return;
  _mid=id;_mslot=i;_mr=r;
  if(r.tp==="num")showNum();
  else if(r.tp==="sel")showSel();
  else if(r.tp==="list")showGains();
  else if(r.tp==="event")showEvt();
  else if(r.tp==="pharma")showPh();

}

// === CUSTOM KEYBOARD (no native iOS keyboard) ===
function buildCustomKB(){
  var h='<div id="customKB" style="margin-top:8px">';
  h+='<div id="kbRows"><\/div>';
  h+='<\/div>';
  return h;
}

function setupCustomKB(){
  var kb=document.getElementById("kbRows");
  window._kbCaps=true; // start uppercase
  window._kbMode="abc"; // "abc" or "sym"
  
  function renderKB(){
    kb.innerHTML="";
    var rows;
    if(window._kbMode==="sym"){
      rows=[
        ["1","2","3","4","5","6","7","8","9","0"],
        ["%","@","#","(",")",":",";",'<',">","="],
        ["!","?","&","*",'"',"[","]","{","}"],
        ["$","|","\\","~","^","_"],
        ["ABC"," ",".",",","/","-","+","DEL"]
      ];
    } else {
      var letters;
      if(window._kbCaps){
        letters=[
          ["Q","W","E","R","T","Y","U","I","O","P"],
          ["A","S","D","F","G","H","J","K","L"],
          ["CAPS","Z","X","C","V","B","N","M"]
        ];
      } else {
        letters=[
          ["q","w","e","r","t","y","u","i","o","p"],
          ["a","s","d","f","g","h","j","k","l"],
          ["CAPS","z","x","c","v","b","n","m"]
        ];
      }
      rows=[
        ["1","2","3","4","5","6","7","8","9","0"],
        letters[0],
        letters[1],
        letters[2],
        ["#+=","%"," ",".",",","/","-","DEL"]
      ];
    }
    
    for(var r=0;r<rows.length;r++){
      var row=document.createElement("div");
      row.style.cssText="display:flex;gap:2px;margin-bottom:2px;justify-content:center";
      for(var c=0;c<rows[r].length;c++){
        var key=rows[r][c];
        var b=document.createElement("button");
        b.setAttribute("data-k",key);
        
        if(key==="DEL"){
          b.style.cssText="flex:1.5;height:34px;border-radius:6px;border:1px solid rgba(255,68,102,.3);background:rgba(255,68,102,.12);color:#ff4466;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit";
          b.textContent="DEL";
        } else if(key===" "){
          b.style.cssText="flex:3;height:34px;border-radius:6px;border:1px solid #263354;background:#111b2e;color:#8a9cc0;font-size:9px;cursor:pointer;font-family:inherit";
          b.textContent="ESPACO";
        } else if(key==="CAPS"){
          b.style.cssText="flex:1.3;height:34px;border-radius:6px;border:1px solid "+(window._kbCaps?"#00ccff":"#263354")+";background:"+(window._kbCaps?"rgba(0,204,255,.15)":"#111b2e")+";color:"+(window._kbCaps?"#00ccff":"#8a9cc0")+";font-size:9px;font-weight:700;cursor:pointer;font-family:inherit";
          b.textContent=window._kbCaps?"AB":"ab";
        } else if(key==="#+="){
          b.style.cssText="flex:1.3;height:34px;border-radius:6px;border:1px solid #263354;background:rgba(179,119,255,.12);color:#b377ff;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit";
          b.textContent="#+=";
        } else if(key==="ABC"){
          b.style.cssText="flex:1.3;height:34px;border-radius:6px;border:1px solid #263354;background:rgba(0,204,255,.12);color:#00ccff;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit";
          b.textContent="ABC";
        } else {
          b.style.cssText="flex:1;height:34px;border-radius:6px;border:1px solid #263354;background:#111b2e;color:#dfe8f5;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-width:24px";
          b.textContent=key;
        }
        row.appendChild(b);
      }
      kb.appendChild(row);
    }
  }
  
  renderKB();
  
  kb.addEventListener("click",function(e){
    var btn=e.target;
    if(btn.tagName!=="BUTTON")return;
    var k=btn.getAttribute("data-k");
    if(!k)return;
    
    if(k==="DEL"){
      window._kbText=window._kbText.slice(0,-1);
    } else if(k==="CAPS"){
      window._kbCaps=!window._kbCaps;
      renderKB();
      return;
    } else if(k==="#+="){
      window._kbMode="sym";
      renderKB();
      return;
    } else if(k==="ABC"){
      window._kbMode="abc";
      renderKB();
      return;
    } else {
      window._kbText+=k;
    }
    var disp=document.getElementById("kbDisp");
    if(window._kbText){disp.innerHTML=window._kbText+'<span class="cursor">|<\/span>';}
    else{disp.innerHTML='-';}
  });
}

// === TOTALS CALCULATION ===
function calcTotals(){
  var t={diurese:0,gains:{},gainsTotal:0,pumpTotals:{}};
  var peso=parseFloat(S.pat.peso)||0;
  for(var i=0;i<=S.cur;i++){
    var d=S.d[i];
    if(!d)continue;
    if(d.diurese)t.diurese+=parseFloat(d.diurese)||0;
    if(d.gains){
      if(!t.gains[d.gains])t.gains[d.gains]=0;
      t.gains[d.gains]++;
      t.gainsTotal++;
    }
    for(var pi=0;pi<S.pumps.length;pi++){
      var pid=S.pumps[pi].id;
      if(d[pid]!==undefined){
        if(!t.pumpTotals[pid])t.pumpTotals[pid]={name:S.pumps[pi].name,unit:S.pumps[pi].unit,totalRate:0,slots:0,id:pid};
        t.pumpTotals[pid].totalRate+=parseFloat(d[pid])||0;
        t.pumpTotals[pid].slots++;
      }
    }
  }
  // Calculate details for all pumps
  for(var pid in t.pumpTotals){
    var pt=t.pumpTotals[pid];
    if(pt.slots===0)continue;
    var avgRate=pt.totalRate/pt.slots;
    var totalH=pt.slots*5/60;
    pt.avgRate=avgRate;
    pt.totalMin=pt.slots*5;
    // Get concentration from pump state
    var conc=0;var concUnit="mg/ml";
    for(var pi=0;pi<S.pumps.length;pi++){
      if(S.pumps[pi].id===pid){conc=S.pumps[pi].conc||0;concUnit=S.pumps[pi].concUnit||"mg/ml";break;}
    }
    var u=pt.unit;
    // ml/h
    if(u==="ml/h"){
      pt.totalMl=avgRate*totalH;
      if(conc>0&&concUnit==="mg/ml"){
        pt.totalMg=pt.totalMl*conc;
        if(peso>0){pt.avgMgKgH=avgRate*conc/peso;pt.avgMcgKgMin=avgRate*conc*1000/(peso*60);}
      }
      if(conc>0&&concUnit==="g/ml"){pt.totalG=pt.totalMl*conc;}
      if(conc>0&&concUnit==="UI/ml"){pt.totalUI=pt.totalMl*conc;}
    }
    // mg/h
    if(u==="mg/h"){pt.totalMg=avgRate*totalH;if(peso>0){pt.avgMgKgH=avgRate/peso;pt.avgMcgKgMin=avgRate*1000/(peso*60);}}
    // mcg/h
    if(u==="mcg/h"){pt.totalMcg=avgRate*totalH;pt.totalMg=pt.totalMcg/1000;}
    // g/h
    if(u==="g/h"){pt.totalG=avgRate*totalH;}
    // UI/h
    if(u==="UI/h"){pt.totalUI=avgRate*totalH;}
    // mg/kg/h
    if(u==="mg/kg/h"){pt.avgMgKgH=avgRate;pt.avgMcgKgMin=avgRate*1000/60;if(peso>0){pt.totalMg=avgRate*peso*totalH;}}
    // mcg/kg/min
    if(u==="mcg/kg/min"){pt.avgMcgKgMin=avgRate;pt.avgMgKgH=avgRate*60/1000;if(peso>0){pt.totalMg=avgRate*peso*pt.totalMin/1000;}}
    // mcg/kg/h
    if(u==="mcg/kg/h"){pt.avgMcgKgH=avgRate;pt.avgMcgKgMin=avgRate/60;if(peso>0){pt.totalMcg=avgRate*peso*totalH;pt.totalMg=pt.totalMcg/1000;}}
  }
  return t;
}

// Format pump detail string for display
function fmtPumpDetail(pt,peso){
  var parts=[];
  if(pt.totalMl!==undefined)parts.push("Vol: "+pt.totalMl.toFixed(1)+"ml");
  if(pt.totalMg!==undefined){
    if(pt.totalMg>=1)parts.push(pt.totalMg.toFixed(1)+"mg total");
    else parts.push((pt.totalMg*1000).toFixed(0)+"mcg total");
  }
  if(pt.totalG!==undefined)parts.push(pt.totalG.toFixed(2)+"g total");
  if(pt.totalUI!==undefined)parts.push(pt.totalUI.toFixed(0)+"UI total");
  if(pt.totalMcg!==undefined&&pt.totalMg===undefined)parts.push(pt.totalMcg.toFixed(0)+"mcg total");
  if(pt.avgMgKgH!==undefined)parts.push(pt.avgMgKgH.toFixed(2)+"mg/kg/h");
  if(pt.avgMcgKgMin!==undefined)parts.push(pt.avgMcgKgMin.toFixed(2)+"mcg/kg/min");
  if(pt.avgMcgKgH!==undefined&&pt.avgMgKgH===undefined)parts.push(pt.avgMcgKgH.toFixed(1)+"mcg/kg/h");
  if(pt.avgGH!==undefined)parts.push(pt.avgGH.toFixed(2)+"g/h");
  if(pt.avgUIH!==undefined)parts.push(pt.avgUIH.toFixed(1)+"UI/h");
  if(pt.totalMin)parts.push(pt.totalMin+"min");
  return parts.join(" | ");
}

    // Fallback: share as text via Web Share API
    if(navigator.share){
      var txt="*UNIANEST - Ficha de Anestesia Digital*\\n";
      txt+="Hospital Universitario Gaffree e Guinle\\n\\n";
      txt+="*PACIENTE:* "+(p.nome||"--")+"\\n";

      txt+="\\n*HORARIOS*\\n";
      txt+="Anestesia: "+aS+" - "+aE+" ("+durA+")\\n";
      txt+="Cirurgia: "+(S.cirSH!==null?cS+" - "+cE+" ("+durC+")":"Nao registrada")+"\\n";
      var hasEv=false;
      for(var i in S.ev){if(!hasEv){txt+="\\n*EVENTOS*\\n";hasEv=true;}
        var sn=getEvtSlotNum(parseInt(i));
        for(var j=0;j<S.ev[i].length;j++){var ev=S.ev[i][j];txt+="E"+sn+" ("+tStr(parseInt(i))+"): "+ev.name+(ev.desc?" - "+ev.desc:"")+"\\n";}}
      var hasPh=false;
      for(var i in S.ph){if(!hasPh){txt+="\\n*FARMACOS*\\n";hasPh=true;}
        var sn=getPhSlotNum(parseInt(i));

      var hasEx=false;
      for(var i in S.ex){if(!hasEx){txt+="\\n*EXAMES*\\n";hasEx=true;}
        var sn=getExSlotNum(parseInt(i));

      if(enc.aldreteTotal>=0)txt+="\\n*ALDRETE-KROULIK:* "+enc.aldreteTotal+"/10\\n";
      navigator.share({title:"UNIANEST - "+(p.nome||"Relatorio"),text:txt}).catch(function(){});

      // Final fallback: copy HTML to clipboard
      var ta=document.createElement("textarea");
      ta.value=fullHTML;ta.style.cssText="position:fixed;opacity:0";

      try{document.execCommand("copy");alert("HTML do relatorio copiado!");}

// Build SVG graph for report - LARGE, clear, landscape-oriented
function buildReportGraph(){
  var maxI=Math.min(S.cur+1,S.slots);
  if(maxI<1)maxI=1;
  var colW=60;
  var leftM=55;
  var W=maxI*colW+leftM+20;
  if(W<400)W=400;
  var H=420;
  var gH=350;
  var topM=20;
  var sMin=20,sMax=240,rng=sMax-sMin;
  
  function yOf(v){return topM+gH-((v-sMin)/rng)*gH;}
  
  var svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">';
  
  // Background
  svg+='<rect width="'+W+'" height="'+H+'" fill="#fff" rx="4"/>';
  
  // Grid area background
  svg+='<rect x="'+leftM+'" y="'+topM+'" width="'+(W-leftM-20)+'" height="'+gH+'" fill="#f8faff" stroke="#ccc" stroke-width="0.5" rx="2"/>';
  
  // Horizontal grid lines + scale labels
  var gridVals=[240,220,200,180,160,140,120,100,80,60,40,20];
  for(var g=0;g<gridVals.length;g++){
    var gy=yOf(gridVals[g]);
    var isMajor=(gridVals[g]%40===0);
    svg+='<line x1="'+leftM+'" y1="'+gy+'" x2="'+(W-20)+'" y2="'+gy+'" stroke="'+(isMajor?"#bbb":"#e0e4ee")+'" stroke-width="'+(isMajor?"0.8":"0.4")+'"/>';
    if(isMajor)svg+='<text x="'+(leftM-5)+'" y="'+(gy+4)+'" text-anchor="end" fill="#666" font-size="10" font-weight="600">'+gridVals[g]+'<\/text>';
  }
  
  // Vertical grid lines + time labels
  for(var i=0;i<maxI;i++){
    var x=leftM+i*colW+colW/2;
    svg+='<line x1="'+x+'" y1="'+topM+'" x2="'+x+'" y2="'+(topM+gH)+'" stroke="#e0e4ee" stroke-width="0.4"/>';
    svg+='<text x="'+x+'" y="'+(topM+gH+15)+'" text-anchor="middle" fill="#444" font-size="9" font-weight="600">'+tStr(i)+'<\/text>';
  }
  
  // Collect data
  var pas=[],pad=[],fc=[];
  for(var i=0;i<maxI;i++){
    var d=S.d[i];
    if(d){
      if(d.pas)pas.push({i:i,v:d.pas});
      if(d.pad)pad.push({i:i,v:d.pad});
      if(d.fc)fc.push({i:i,v:d.fc});
    }
  }
  
  // PAS line
  if(pas.length>1){
    var pts="";for(var j=0;j<pas.length;j++){if(j)pts+=" ";pts+=(leftM+pas[j].i*colW+colW/2)+","+yOf(pas[j].v);}
    svg+='<polyline points="'+pts+'" fill="none" stroke="#2288ff" stroke-width="2" stroke-linejoin="round"/>';
  }
  for(var j=0;j<pas.length;j++){
    var cx=leftM+pas[j].i*colW+colW/2,cy=yOf(pas[j].v);
    svg+='<polygon points="'+cx+','+(cy+8)+' '+(cx-6)+','+(cy-2)+' '+(cx+6)+','+(cy-2)+'" fill="#2288ff"/>';
    svg+='<text x="'+cx+'" y="'+(cy-8)+'" text-anchor="middle" fill="#2288ff" font-size="10" font-weight="bold">'+pas[j].v+'<\/text>';
  }
  
  // PAD line
  if(pad.length>1){
    var pts="";for(var j=0;j<pad.length;j++){if(j)pts+=" ";pts+=(leftM+pad[j].i*colW+colW/2)+","+yOf(pad[j].v);}
    svg+='<polyline points="'+pts+'" fill="none" stroke="#1166aa" stroke-width="2" stroke-linejoin="round"/>';
  }
  for(var j=0;j<pad.length;j++){
    var cx=leftM+pad[j].i*colW+colW/2,cy=yOf(pad[j].v);
    svg+='<polygon points="'+cx+','+(cy-8)+' '+(cx-6)+','+(cy+2)+' '+(cx+6)+','+(cy+2)+'" fill="#1166aa"/>';
    svg+='<text x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" fill="#1166aa" font-size="10" font-weight="bold">'+pad[j].v+'<\/text>';
  }
  
  // FC line (dashed)
  if(fc.length>1){
    var pts="";for(var j=0;j<fc.length;j++){if(j)pts+=" ";pts+=(leftM+fc[j].i*colW+colW/2)+","+yOf(fc[j].v);}
    svg+='<polyline points="'+pts+'" fill="none" stroke="#ee3355" stroke-width="1.5" stroke-dasharray="6,4" stroke-linejoin="round"/>';
  }
  for(var j=0;j<fc.length;j++){
    var cx=leftM+fc[j].i*colW+colW/2,cy=yOf(fc[j].v);
    svg+='<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#ee3355"/>';
    svg+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="#fff"/>';
    svg+='<text x="'+(cx+10)+'" y="'+(cy+4)+'" fill="#ee3355" font-size="9" font-weight="bold">'+fc[j].v+'<\/text>';
  }
  
  // Y-axis label
  svg+='<text x="12" y="'+(topM+gH/2)+'" text-anchor="middle" fill="#888" font-size="9" font-weight="600" transform="rotate(-90,12,'+(topM+gH/2)+')">mmHg / bpm<\/text>';
  
  svg+='<\/svg>';
  return svg;
}

// === PATIENT DATA ===
function showPatient(){
  var p=S.pat;
  var fields=[
    {id:"nome",lb:"Nome completo",val:p.nome,type:"text"},
    {id:"cpf",lb:"CPF",val:p.cpf,type:"text"},
    {id:"dn",lb:"Data nascimento",val:p.dn,type:"text",ph:"DD/MM/AAAA"},
    {id:"genero",lb:"Genero",val:p.genero,type:"sel",opts:["Masculino","Feminino"]},
    {id:"idade",lb:"Idade (anos)",val:p.idade,type:"text",ph:"Ex: 60"},
    {id:"peso",lb:"Peso (kg)",val:p.peso,type:"text",ph:"Ex: 72"},
    {id:"altura",lb:"Altura (m)",val:p.altura,type:"text",ph:"Ex: 1.70"},
    {id:"jejum",lb:"Jejum",val:p.jejum,type:"sel",opts:["Adequado","Inadequado","Nao informado"]},
    {id:"alergias",lb:"Alergias",val:p.alergias,type:"text",ph:"Nega ou descreva"},
    {id:"doencas",lb:"Doencas / Comorbidades",val:p.doencas,type:"text",ph:"Nega ou descreva"},
    {id:"cirPrevias",lb:"Cirurgias previas",val:p.cirPrevias,type:"text",ph:"Nega ou descreva"},
    {id:"medicamentos",lb:"Medicamentos em uso",val:p.medicamentos,type:"text",ph:"Nega ou descreva"},
    {id:"mallampati",lb:"Mallampati",val:p.mallampati,type:"sel",opts:["I","II","III","IV"]},
    {id:"asa",lb:"ASA",val:p.asa,type:"sel",opts:["I","II","III","IV","V","VI"]},
    {id:"consentimento",lb:"Consentimento informado",val:p.consentimento,type:"sel",opts:["Sim","Nao"]},
    {id:"cirurgiao",lb:"Cirurgiao",val:p.cirurgiao,type:"text"},
    {id:"cirurgia",lb:"Cirurgia proposta",val:p.cirurgia,type:"text"},
    {id:"sala",lb:"Sala",val:p.sala,type:"text",ph:"Ex: 3"}
  ];
  var h='<div class="mhdr"><div class="mtitle">Dados do Paciente<\/div><div class="mclose" id="mcl">X<\/div><\/div>';
  h+='<div id="patForm" style="max-height:60vh;overflow-y:auto">';
  for(var i=0;i<fields.length;i++){
    var f=fields[i];
    h+='<div class="mlabel">'+f.lb+'<\/div>';
    if(f.type==="sel"){
      h+='<div class="opts" data-fid="'+f.id+'" style="flex-direction:row;flex-wrap:wrap;gap:4px">';
      for(var j=0;j<f.opts.length;j++){
        h+='<div class="opt'+(f.val===f.opts[j]?" sel":"")+'" data-v="'+f.opts[j]+'" data-fid="'+f.id+'" style="flex:1;text-align:center;padding:8px;min-width:60px">'+f.opts[j]+'<\/div>';
      }
      h+='<\/div>';
    } else {
      h+='<input id="pf_'+f.id+'" type="text" value="'+(f.val||"")+'" placeholder="'+(f.ph||"")+'" style="width:100%;padding:10px;background:#0b1120;border:1px solid #263354;border-radius:8px;color:#dfe8f5;font-family:inherit;font-size:13px">';
    }
  }
  h+='<\/div>';
  h+='<div class="mbtns" style="margin-top:12px"><button class="mbtn mbtn-c" id="bCan">Cancelar<\/button><button class="mbtn mbtn-s" id="bSav">Salvar<\/button><\/div>';
  openM(h);

  // Select field handlers
  var form=document.getElementById("patForm");
  form.addEventListener("click",function(e){
    var el=e.target;
    if(!el.classList.contains("opt")||!el.getAttribute("data-fid"))return;
    var fid=el.getAttribute("data-fid");
    var val=el.getAttribute("data-v");
    // Deselect siblings
    var parent=el.parentElement;
    var siblings=parent.querySelectorAll(".opt");
    for(var k=0;k<siblings.length;k++)siblings[k].classList.remove("sel");
    el.classList.add("sel");
    S.pat[fid]=val;
  });

  document.getElementById("mcl").addEventListener("click",closeM);
  document.getElementById("bCan").addEventListener("click",closeM);
  document.getElementById("bSav").addEventListener("click",function(){
    // Save text fields
    var textFields=["nome","cpf","dn","idade","peso","altura","alergias","doencas","cirPrevias","medicamentos","cirurgiao","cirurgia","sala"];
    for(var k=0;k<textFields.length;k++){
      var inp=document.getElementById("pf_"+textFields[k]);
      if(inp)S.pat[textFields[k]]=inp.value;
    }
    // Update header
    if(S.pat.nome){
      document.getElementById("patName").textContent=S.pat.nome;
    } else {
      document.getElementById("patName").textContent="Dados do Paciente";
    }
    closeM();
  });
}

      var mid=this.getAttribute("data-mid");
      var idx=-1;
      for(var k=0;k<S.monitors.length;k++){if(S.monitors[k].id===mid){idx=k;break;}}
      if(idx>=0){S.monitors.splice(idx,1);}
      else{for(var k=0;k<MONITOR_OPTS.length;k++){if(MONITOR_OPTS[k].id===mid){S.monitors.push({id:MONITOR_OPTS[k].id,name:MONITOR_OPTS[k].name,unit:MONITOR_OPTS[k].unit,cc:MONITOR_OPTS[k].cc});break;}}}
      ROWS=buildRows();render();showConfig();

    var del=document.createElement("div");
    del.style.cssText="width:32px;height:32px;border-radius:8px;background:rgba(255,68,102,.15);border:1px solid rgba(255,68,102,.3);display:flex;align-items:center;justify-content:center;color:#ff4466;cursor:pointer;flex-shrink:0";
    del.textContent="X";
    del.setAttribute("data-idx",j);
    del.addEventListener("click",function(){
      var idx=parseInt(this.getAttribute("data-idx"));
      S.pumps.splice(idx,1);
      ROWS=buildRows();
      render();showConfig();
    });
    row.appendChild(info);row.appendChild(ubtn);row.appendChild(del);active.appendChild(row);
  }
  
  // Available pumps to add
  var list=document.getElementById("cfgList");
  for(var j=0;j<PUMP_DRUGS.length;j++){

    var isActive=false;
    for(var k=0;k<S.pumps.length;k++){if(S.pumps[k].id===PUMP_DRUGS[j].id){isActive=true;break;}}

    });

  }
  
  document.getElementById("mcl").addEventListener("click",closeM);
}

function showPumpUnitSelect(drug){
  // If drug has multiple concentrations, ask first
  if(drug.concs&&drug.concs.length>1){
    showPumpConcSelect(drug);
    return;
  }
  var h='<div class="mhdr"><div class="mtitle">'+drug.name+' - Unidade<\/div><div class="mclose" id="mcl">X<\/div><\/div>';
  h+='<div class="mlabel">SELECIONE A UNIDADE<\/div>';
  h+='<div class="opts" id="unitList"><\/div>';
  openM(h);
  var list=document.getElementById("unitList");
  var fixedConc=drug.conc||0;
  for(var j=0;j<drug.units.length;j++){
    var d=document.createElement("div");d.className="opt";d.textContent=drug.units[j];d.setAttribute("data-u",drug.units[j]);
    d.addEventListener("click",function(){
      var u=this.getAttribute("data-u");
      S.pumps.push({id:drug.id,name:drug.name,unit:u,conc:fixedConc});
      ROWS=buildRows();render();showConfig();
    });
    list.appendChild(d);
  }
  document.getElementById("mcl").addEventListener("click",closeM);
}

function showPumpConcSelect(drug){
  var h='<div class="mhdr"><div class="mtitle">'+drug.name+' - Concentracao<\/div><div class="mclose" id="mcl">X<\/div><\/div>';
  h+='<div class="mlabel">SELECIONE A CONCENTRACAO ('+(drug.concUnit||"mg/ml")+')<\/div>';
  h+='<div class="opts" id="concList"><\/div>';
  openM(h);
  var list=document.getElementById("concList");
  for(var j=0;j<drug.concs.length;j++){
    var d=document.createElement("div");d.className="opt";
    d.textContent=drug.concs[j]+" "+(drug.concUnit||"mg/ml");
    d.setAttribute("data-c",drug.concs[j]);
    d.addEventListener("click",function(){
      var c=parseFloat(this.getAttribute("data-c"));
      window._selConc=c;
      showPumpUnitAfterConc(drug,c);
    });
    list.appendChild(d);
  }
  document.getElementById("mcl").addEventListener("click",closeM);
}

function showPumpUnitAfterConc(drug,conc){
  var h='<div class="mhdr"><div class="mtitle">'+drug.name+' ('+conc+(drug.concUnit||"mg/ml")+') - Unidade<\/div><div class="mclose" id="mcl">X<\/div><\/div>';
  h+='<div class="mlabel">SELECIONE A UNIDADE<\/div>';
  h+='<div class="opts" id="unitList"><\/div>';
  openM(h);
  var list=document.getElementById("unitList");
  for(var j=0;j<drug.units.length;j++){
    var d=document.createElement("div");d.className="opt";d.textContent=drug.units[j];d.setAttribute("data-u",drug.units[j]);
    d.addEventListener("click",function(){
      var u=this.getAttribute("data-u");
      var cUnit=drug.concUnit||"mg/ml";
      S.pumps.push({id:drug.id,name:drug.name+" ("+conc+cUnit+")",unit:u,conc:conc,concUnit:cUnit});
      ROWS=buildRows();render();showConfig();
    });
    list.appendChild(d);
  }
  document.getElementById("mcl").addEventListener("click",closeM);
}

function showPumpUnitChange(pumpIdx){
  var pump=S.pumps[pumpIdx];
  var drug=null;
  for(var j=0;j<PUMP_DRUGS.length;j++){if(PUMP_DRUGS[j].id===pump.id){drug=PUMP_DRUGS[j];break;}}
  if(!drug)return;
  var h='<div class="mhdr"><div class="mtitle">'+pump.name+' - Alterar Unidade<\/div><div class="mclose" id="mcl">X<\/div><\/div>';
  h+='<div class="mlabel">SELECIONE A NOVA UNIDADE<\/div>';
  h+='<div class="opts" id="unitList"><\/div>';
  openM(h);
  var list=document.getElementById("unitList");
  for(var j=0;j<drug.units.length;j++){
    var d=document.createElement("div");
    d.className="opt"+(drug.units[j]===pump.unit?" sel":"");
    d.textContent=drug.units[j];
    d.setAttribute("data-u",drug.units[j]);
    d.addEventListener("click",function(){
      var u=this.getAttribute("data-u");
      S.pumps[pumpIdx].unit=u;
      ROWS=buildRows();
      render();showConfig();
    });
    list.appendChild(d);
  }
  document.getElementById("mcl").addEventListener("click",closeM);
}

function salvarFichaLocal(){
  try{
    var fichaData={timestamp:new Date().toISOString(),state:JSON.parse(JSON.stringify(S))};
    localStorage.setItem("UNIANEST_fichaIntra_atual",JSON.stringify(fichaData));
  }catch(e){console.error("Erro ao salvar:",e);}
}

function encaminharParaRPA(){
  try{
    var dadosRPA={
      timestamp:new Date().toISOString(),
      paciente:S.pat,
      encerramento:S.enc,
      tempoAnestesia:{inicio:S.anestSH!==null?fmtT(S.anestSH,S.anestSM):null,fim:S.anestEH!==null?fmtT(S.anestEH,S.anestEM):null},
      tempoCirurgia:{inicio:S.cirSH!==null?fmtT(S.cirSH,S.cirSM):null,fim:S.cirEH!==null?fmtT(S.cirEH,S.cirEM):null},
      farmacos:S.ph,eventos:S.ev,bombas:S.pumps,sinaisVitais:S.d,
      aldrete:S.enc.aldrete,aldreteTotal:S.enc.aldreteTotal
    };
    localStorage.setItem("UNIANEST_dadosParaRPA",JSON.stringify(dadosRPA));
    if(confirm("Ficha salva! Deseja ir para a RPA agora?")){window.location.href="rpa.html";}
    else{closeM();}
  }catch(e){alert("Erro ao encaminhar: "+e.message);}
}

function calcAldrete(){
  var a=S.enc.aldrete;
  var vals=[a.atividade,a.respiracao,a.consciencia,a.circulacao,a.spo2];
  var total=0;var complete=true;
  for(var j=0;j<vals.length;j++){
    if(vals[j]<0){complete=false;break;}
    total+=vals[j];
  }
  if(complete){
    S.enc.aldreteTotal=total;
    var el=document.getElementById("aldTotal");
    if(el){
      el.textContent=total;
      el.style.color=total>=8?"#00e68a":(total>=6?"#ffdd44":"#ff5566");
    }
  }
}

// === TOUCH HANDLER ===
(function(){
  var wrap=document.getElementById("wrap");
  var sx=0,sy=0,st=0,sel=null;
  function findCell(el){while(el&&el!==wrap){if(el.tagName==="TD"&&el.classList.contains("dc")&&el.getAttribute("data-r"))return el;el=el.parentElement;}return null;}
  wrap.addEventListener("touchstart",function(e){var t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();sel=findCell(e.target);},{passive:true});
  wrap.addEventListener("touchend",function(e){if(!sel)return;var t=e.changedTouches[0];if(Math.abs(t.clientX-sx)<12&&Math.abs(t.clientY-sy)<12&&Date.now()-st<500){e.preventDefault();var rid=sel.getAttribute("data-r");var idx=parseInt(sel.getAttribute("data-i"));sel.style.background="rgba(0,204,255,.2)";setTimeout(function(){if(sel)sel.style.background="";},200);cellTap(rid,idx);}sel=null;},{passive:false});
  wrap.addEventListener("click",function(e){if("ontouchstart"in window)return;var cell=findCell(e.target);if(!cell)return;cellTap(cell.getAttribute("data-r"),parseInt(cell.getAttribute("data-i")));});
})();

// === iOS KEYBOARD FIX ===
(function(){
  // Prevent body scroll - whitelist scrollable elements
  document.body.addEventListener("touchmove",function(e){
    var el=e.target;
    var ok=false;
    while(el){
      if(el.tagName==="TEXTAREA"||el.tagName==="INPUT"){ok=true;break;}
      if(el.classList&&(el.classList.contains("wrap")||el.classList.contains("modal")||el.classList.contains("opts")||el.id==="patForm"||el.id==="evtAdd"||el.id==="phAdd"||el.id==="exList"||el.id==="gainList"||el.id==="cfgList"||el.id==="cfgActive"||el.id==="unitList"||el.id==="reportOverlay")){ok=true;break;}
      el=el.parentElement;
    }
    if(!ok)e.preventDefault();
  },{passive:false});
  
  function fix(){
    window.scrollTo(0,0);
    document.body.scrollTop=0;
    document.documentElement.scrollTop=0;
    var app=document.getElementById("app");
    if(app){
      app.style.display="none";
      app.offsetHeight;
      app.style.display="flex";
      app.style.top="0";
    }
  }
  
  document.addEventListener("focusout",function(e){
    if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT"||e.target.tagName==="SELECT"){
      setTimeout(fix,50);
      setTimeout(fix,300);
      setTimeout(fix,600);
    }
  });
  
  var origClose=closeM;
  closeM=function(){
    if(document.activeElement&&document.activeElement!==document.body)document.activeElement.blur();
    // Wait longer for iOS keyboard to fully close before closing modal
    setTimeout(function(){
      origClose();
      setTimeout(fix,50);
      setTimeout(fix,200);
      setTimeout(fix,500);
      setTimeout(fix,1000);
    },300);
  };
})();
</script>
